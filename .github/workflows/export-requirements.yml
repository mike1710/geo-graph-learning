name: export-requirements

# Regenerate per-unit requirements/*.txt whenever the dependency source
# (pyproject.toml) changes, and commit the result back. Lets the demo notebooks'
# setup cell fetch an always-current requirements/<unit>.txt from main.
#
# Loop-safe: the trigger fires only on changes to pyproject.toml, and the job's
# own commit touches only requirements/ — so the auto-commit never re-triggers
# the workflow. workflow_dispatch lets you regenerate on demand.
#
# Note: scripts/export-requirements.sh runs a uv-based resolve gate then writes
# slim direct-dep files; setup-uv provides uv, and the ubuntu-latest python3
# (>=3.11) supplies tomllib for the slim-write step.
on:
  push:
    branches: [main]
    paths: ['pyproject.toml']
  workflow_dispatch: {}

permissions:
  contents: write          # allow the job to commit regenerated files back

concurrency:               # avoid overlapping regenerations racing each other
  group: export-requirements
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Regenerate per-unit requirements
        run: bash scripts/export-requirements.sh
      - name: Commit regenerated requirements (if changed)
        run: |
          if [[ -n "$(git status --porcelain requirements/)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add requirements/
            git commit -m "ci: regenerate requirements/*.txt from pyproject.toml"
            git push
          else
            echo "requirements/ already up to date — nothing to commit."
          fi
