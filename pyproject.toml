[project]
name = "geo-graph-learning"
version = "0.1.0"
description = "Student package for the Geospatial Graph Learning chapter of a Geo AI course"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "pandas",
    "matplotlib",
    "jupyter",
    "ipykernel",
]

# Per-unit optional dependencies. Add libraries to a unit's extra as that
# unit is built. Keep this hand-edited — `requirements/*.txt` is auto-generated.
[project.optional-dependencies]
unit-1 = [
    "osmnx>=2.0,<3.0",
    "networkx>=3.0",
    "geopandas>=1.0",
    "shapely>=2.0",
    "requests",
    "pyrosm",
    "igraph",
    "folium",
    "mapclassify",
    "gdown",
]
unit-2 = [
    "leuvenmapmatching",
    "osmnx>=2.0,<3.0",
    "geopandas>=1.0",
    "shapely>=2.0",
    "pyproj",
    "rtree",
    "scipy",
    "networkx>=3.0",
    "filterpy",
    "tslearn",
    "scikit-image",
    "folium",
    "mapclassify",
    "branca",
    "contextily",
    "pyarrow",
    "gdown",
]
unit-3 = [
    "pandas>=2.0",
    "numpy>=1.24",
    "matplotlib>=3.7",
    "statsmodels>=0.14",
    "statsforecast>=1.7",
    "pyarrow>=14",
    "h5py>=3.0",
    "folium>=0.15",
    "gdown>=5.0",
]
unit-4 = [
    "osmnx>=2.0          # road graph from bbox; add_edge_speeds/travel_times; routing helpers (U1 stack)",
    "networkx>=3.0       # Dijkstra, A* (astar_path), single-source cutoff (isochrones), TDSP via callable weight, time-expanded graph",
    "geopandas>=1.0      # snap GTFS shapes to edges (sjoin_nearest), reprojection, GTFS stop geometries",
    "shapely>=2.0        # geometry; isochrone hull polygons; shape LineStrings",
    "pyproj              # metric CRS (EPSG:2039) reprojection",
    "rtree               # spatial index for sjoin_nearest / candidate search",
    "scipy               # numerics (hull / binning helpers)",
    "gtfs-kit            # parse the MoT GTFS; clip to bbox + weekday service_id; source of road w(t)",
    "folium              # interactive maps (basemap + topology toggle) — viz-rich policy",
    "mapclassify         # choropleth binning (coverage map, CoA map)",
    "branca              # colormaps/legends for folium overlays",
    "contextily          # static basemap tiles (fallback / static figures only)",
    "pyarrow             # read/write cached w(t) and GTFS-derived parquet artifacts",
    "gdown               # fetch the hosted OSM backup graph (Drive)",
    "pyraptor            # OPTIONAL transit cross-check — import-guarded; vendored RAPTOR is the default backend",
]
unit-5 = [
    # GNNs — populated during unit-5 build
    # Note: do NOT pin torch here; Colab manages its own.
    # `setup_colab.py` handles runtime detection for PyG wheels.
]
all = [
    # Union of all units. Hand-edit when adding to per-unit extras above.
]
dev = [
    "papermill",
    "nbqa",
    "pre-commit",
]
# Local-only tools for the agent-driven notebook bridge (see SETUP.md and
# .mcp.json). NOT a unit extra → never enters requirements/*.txt or Colab.
# jupyter-mcp-server itself runs via `uvx` (isolated), so it is not pinned here.
# jupyter-collaboration 4.x (the RTC extension that lets the agent and student
# co-edit without save conflicts) requires JupyterLab >=4.4, so both track the
# current 4.x line together.
local = [
    "jupyterlab>=4.4,<5.0",
    "jupyter-collaboration>=4.0,<5.0",
    "ipykernel",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.uv]
# Reproducible installs across the cohort.
package = true
