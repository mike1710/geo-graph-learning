[project]
name = "geo-graph-learning"
version = "0.1.0"
description = "Student package for the Geospatial Graph Learning chapter of a Geo AI course"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "pandas",
    "matplotlib",
    "jupyter",
    "ipykernel",
]

# Per-unit optional dependencies. Add libraries to a unit's extra as that
# unit is built. Keep this hand-edited — `requirements/*.txt` is auto-generated.
[project.optional-dependencies]
unit-1 = [
    "osmnx>=2.0,<3.0",
    "networkx>=3.0",
    "geopandas>=1.0",
    "shapely>=2.0",
    "requests",
    "pyrosm",
    "igraph",
    "folium",
    "mapclassify",
    "gdown",
]
unit-2 = [
    "leuvenmapmatching",
    "osmnx>=2.0,<3.0",
    "geopandas>=1.0",
    "shapely>=2.0",
    "pyproj",
    "rtree",
    "scipy",
    "networkx>=3.0",
    "filterpy",
    "tslearn",
    "scikit-image",
    "folium",
    "mapclassify",
    "branca",
    "contextily",
    "pyarrow",
    "gdown",
]
unit-3 = [
    "pandas>=2.0",
    "numpy>=1.24",
    "matplotlib>=3.7",
    "statsmodels>=0.14",
    "statsforecast>=1.7",
    "pyarrow>=14",
    "folium>=0.15",
    "gdown>=5.0",
]
unit-4 = [
    # Dynamic Navigation — populated during unit-4 build
    # (was syllabus's Unit 3; renumbered to teach order)
]
unit-5 = [
    # GNNs — populated during unit-5 build
    # Note: do NOT pin torch here; Colab manages its own.
    # `setup_colab.py` handles runtime detection for PyG wheels.
]
all = [
    # Union of all units. Hand-edit when adding to per-unit extras above.
]
dev = [
    "papermill",
    "nbqa",
    "pre-commit",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.uv]
# Reproducible installs across the cohort.
package = true
